<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vouya — Acompanhar viagem</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #0F172A;
  color: #F1F5F9;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  background: #1E293B;
  border-radius: 24px;
  padding: 32px 28px;
  max-width: 380px; width: 100%;
  text-align: center;
  border: 1px solid #334155;
}
.logo { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 6px; letter-spacing: -0.02em; }
.logo span { color: #60A5FA; }
.subtitle { font-size: 13px; color: #94A3B8; margin-bottom: 28px; }
.status-dot {
  width: 12px; height: 12px; background: #10B981; border-radius: 50%;
  display: inline-block; margin-right: 6px;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
  100% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
}
.protected {
  display: inline-flex; align-items: center;
  background: #064E3B; color: #6EE7B7;
  padding: 6px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  margin-bottom: 24px;
}
.traveler-name {
  font-size: 26px; font-weight: 800; color: #fff;
  margin-bottom: 6px; letter-spacing: -0.01em;
}
.dest {
  font-size: 15px; color: #60A5FA; font-weight: 600;
  margin-bottom: 4px;
}
.dates { font-size: 13px; color: #94A3B8; margin-bottom: 28px; }
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}
.info-card {
  background: #0F172A; border-radius: 12px;
  padding: 14px 12px; text-align: center;
}
.info-card__icon { font-size: 20px; margin-bottom: 6px; }
.info-card__label { font-size: 11px; color: #64748B; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.info-card__value { font-size: 14px; font-weight: 600; color: #F1F5F9; }
.footer {
  font-size: 12px; color: #475569; line-height: 1.6;
  border-top: 1px solid #334155; padding-top: 18px; margin-top: 4px;
}
.error { color: #F87171; font-size: 15px; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">VOU<span>YA</span></div>
  <div class="subtitle">Página de acompanhamento de viagem</div>
  <div id="content">
    <p style="color:#94A3B8;font-size:14px;">Carregando...</p>
  </div>
</div>
<script>
try {
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('v');
  if (!encoded) throw new Error('sem dados');

  const data = JSON.parse(decodeURIComponent(atob(encoded)));
  const now = new Date().toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });

  document.getElementById('content').innerHTML = `
    <div class="protected">
      <span class="status-dot"></span> Protegida pelo Vouya
    </div>
    <div class="traveler-name">${data.name}</div>
    <div class="dest">📍 ${data.dest}</div>
    <div class="dates">${data.dates}</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-card__icon">🛡️</div>
        <div class="info-card__label">Status</div>
        <div class="info-card__value" style="color:#6EE7B7">Segura</div>
      </div>
      <div class="info-card">
        <div class="info-card__icon">🔔</div>
        <div class="info-card__label">Alertas</div>
        <div class="info-card__value">Ativos</div>
      </div>
      <div class="info-card">
        <div class="info-card__icon">📡</div>
        <div class="info-card__label">Monitoramento</div>
        <div class="info-card__value" style="color:#6EE7B7">Online</div>
      </div>
      <div class="info-card">
        <div class="info-card__icon">🕐</div>
        <div class="info-card__label">Atualizado</div>
        <div class="info-card__value" style="font-size:12px">${now}</div>
      </div>
    </div>
    <div class="footer">
      Esta página foi compartilhada pela viajante.<br>
      Em caso de emergência, entre em contato diretamente com ela.
    </div>
  `;
} catch(e) {
  document.getElementById('content').innerHTML =
    '<p class="error">Link inválido ou expirado.</p>';
}
</script>
</body>
</html>
